# ============================================================
# foss-universe / docker-compose.yml
# OpenAlgo — VPS Deployment
# ============================================================

services:

  # ------------------------------------------------------------------ #
  # OpenAlgo Main Application
  # ------------------------------------------------------------------ #
  foss_universe_container:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: foss_universe_container
    hostname: foss-universe
    networks:
      - foss_internal
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      # ---- Direct bind mounts for persistence ---- #
      - ${DATA_DIR:-./data}:/home/ubuntu/foss-universe/data:rw
      - ${DATA_DIR:-./data}/db:/app/db:rw
      - ${DATA_DIR:-./data}/log:/app/log:rw
      - ${DATA_DIR:-./data}/strategies:/app/strategies:rw
      - ${DATA_DIR:-./data}/keys:/app/keys:rw
      - ${DATA_DIR:-./data}/tmp:/app/tmp:rw
      # ---- Secrets: decrypted .env ---- #
      - ${DATA_DIR:-./data}/.env:/app/.env:ro
      # ---- SSL certs (Cloudflare Origin Certificate) ---- #
      - ${SSL_DIR:-./ssl}:/etc/nginx/ssl:ro
    environment:
      - TZ=Asia/Kolkata
      - FLASK_ENV=${FLASK_ENV:-production}
      - FLASK_DEBUG=${FLASK_DEBUG:-False}
      - HOST_SERVER=${HOST_SERVER:-https://zerotouchalgo.com}
      - REDIRECT_URL=${REDIRECT_URL:-https://zerotouchalgo.com/zerodha/callback}
      - VALID_BROKERS=${VALID_BROKERS:-zerodha,fyers,angel,dhan,upstox,deltaexchange}
      - APP_KEY=${APP_KEY}
      - API_KEY_PEPPER=${API_KEY_PEPPER}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///db/openalgo.db}
      - WEBSOCKET_HOST=0.0.0.0
      - WEBSOCKET_PORT=8765
      - WEBSOCKET_URL=${WEBSOCKET_URL:-wss://zerotouchalgo.com/ws}
      - ZMQ_HOST=127.0.0.1
      - ZMQ_PORT=5555
      - MAX_SYMBOLS_PER_WEBSOCKET=1000
      - MAX_WEBSOCKET_CONNECTIONS=3
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - OPENBLAS_NUM_THREADS=${OPENBLAS_NUM_THREADS:-2}
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-2}
      - MKL_NUM_THREADS=${MKL_NUM_THREADS:-2}
      - NUMEXPR_NUM_THREADS=${NUMEXPR_NUM_THREADS:-2}
      - NUMBA_NUM_THREADS=${NUMBA_NUM_THREADS:-2}
      - STRATEGY_MEMORY_LIMIT_MB=${STRATEGY_MEMORY_LIMIT_MB:-1024}
      - CORS_ENABLED=TRUE
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://zerotouchalgo.com}
      - CSP_ENABLED=FALSE
      - CSRF_ENABLED=FALSE
      - SESSION_EXPIRY_TIME=03:00
      - NGROK_ALLOW=FALSE
      - LOG_TO_FILE=True
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # OpenAlgo uses PORT env var to determine which port to bind
      - PORT=5000
    env_file:
      - ${DATA_DIR:-./data}/.env
    shm_size: ${SHM_SIZE:-512m}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/auth/check-setup || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    labels:
      - "com.zerotouchalgo.project=foss-universe"
      - "com.zerotouchalgo.component=app"

  # ------------------------------------------------------------------ #
  # Redis — Cache + message queue
  # ------------------------------------------------------------------ #
  redis:
    image: redis:7-alpine
    container_name: foss_redis
    hostname: foss-redis
    networks:
      - foss_internal
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_redis_pass}
    volumes:
      - ${DATA_DIR:-./data}/log:/data/log:rw
      - ${DATA_DIR:-./data}/tmp:/data/tmp:rw
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-changeme_redis_pass} ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    labels:
      - "com.zerotouchalgo.project=foss-universe"
      - "com.zerotouchalgo.component=cache"

  # ------------------------------------------------------------------ #
  # nginx — Reverse proxy
  # ------------------------------------------------------------------ #
  nginx:
    image: nginx:1.27-alpine
    container_name: foss_universe_nginx
    hostname: foss-nginx
    networks:
      - foss_internal
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:8443:8443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ${DATA_DIR:-./data}/log:/var/log/nginx:rw
      - ${SSL_DIR:-./ssl}:/etc/nginx/ssl:ro
    healthcheck:
      test: ["CMD-SHELL", "pgrep nginx || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    labels:
      - "com.zerotouchalgo.project=foss-universe"
      - "com.zerotouchalgo.component=proxy"

  # ------------------------------------------------------------------ #
  # cloudflare-ddns — Dynamic DNS updater
  # ------------------------------------------------------------------ #
  cloudflare-ddns:
    image: alpine:latest
    container_name: foss_cf_ddns
    hostname: foss-cf-ddns
    networks:
      - foss_internal
    volumes:
      - ./docker/scripts/update-dns.sh:/update-dns.sh:ro
    environment:
      - CF_API_TOKEN=${CF_API_TOKEN}
      - CF_ZONE_ID=${CF_ZONE_ID}
      - RECORD_NAME=${RECORD_NAME:-zerotouchalgo.com}
      - RECORD_TYPE=${RECORD_TYPE:-A}
    entrypoint: ["/bin/sh", "/update-dns.sh"]
    restart: unless-stopped
    labels:
      - "com.zerotouchalgo.project=foss-universe"
      - "com.zerotouchalgo.component=ddns"
    depends_on:
      - foss_universe_container

networks:
  foss_internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16