    }

    # ---- Fallback: SPA routing ---- #
    location @app {
        proxy_pass http://foss_backend;
    }

    # ---- Health Check Endpoint ---- #
    location /nginx-health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}

# -------------------------------------------------------------------------- #
# Cloudflare Origin Probe (port 8443)
# -------------------------------------------------------------------------- #
server {
    listen 127.0.0.1:8443;
    server_name _;

    location /nginx-health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    location / {
        return 200 'Origin Probe OK';
    }
}
