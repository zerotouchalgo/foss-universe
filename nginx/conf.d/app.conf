# nginx/conf.d/app.conf

# Upstream: backend API
upstream foss_backend {
    server foss_universe_container:5000;
    keepalive 32;
}

# -------------------------------------------------------------------------- #
# HTTP Server for localhost / development testing
# -------------------------------------------------------------------------- #
server {
    listen 80;
    server_name localhost 127.0.0.1 _;

    # ---- Proxy Headers ---- #
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto http;

    # ---- Upgrade for WebSocket ---- #
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # ---- API & WebSocket Proxy ---- #
    location ~ ^/(api|auth|ws|socket.io)/ {
        proxy_pass http://foss_backend;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ---- Static Assets ---- #
    location /static/ {
        proxy_pass http://foss_backend;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ---- Everything else → Backend ---- #
    location / {
        proxy_pass http://foss_backend;
    }

    # ---- Health Check Endpoint ---- #
    location /nginx-health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}

# -------------------------------------------------------------------------- #
# HTTPS redirect for external domains
# -------------------------------------------------------------------------- #
server {
    listen 80;
    server_name zerotouchalgo.com www.zerotouchalgo.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# -------------------------------------------------------------------------- #
# HTTPS — Main Application (Cloudflare Origin Certificate)
# -------------------------------------------------------------------------- #
server {
    listen 443 ssl;
    http2 on;
    server_name zerotouchalgo.com www.zerotouchalgo.com;

    # ---- SSL Configuration (Cloudflare Origin Certificate) ---- #
    ssl_certificate /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ---- Security ---- #
    limit_req zone=api_limit burst=20 nodelay;
    limit_conn conn_limit 10;

    # ---- Proxy Headers ---- #
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    # ---- Upgrade for WebSocket ---- #
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # ---- Timeouts for long-running connections (WebSocket, streaming) ---- #
    proxy_connect_timeout 7s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    # ---- API & WebSocket Proxy ---- #
    location ~ ^/(api|auth|ws|socket.io)/ {
        proxy_pass http://foss_backend;
        proxy_redirect off;

        # WebSocket ping/pong keepalive
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ---- Static Assets (built frontend) ---- #
    location /static/ {
        proxy_pass http://foss_backend;
        proxy_cache STATIC_CACHE;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ---- Everything else → Frontend SPA ---- #
    location / {
        proxy_pass http://foss_backend;
        proxy_redirect off;
        try_files $uri @app;
    }

    # ---- Fallback: SPA routing ---- #
    location @app {
        proxy_pass http://foss_backend;
        proxy_redirect off;
    }

    # ---- Health Check Endpoint ---- #
    location /nginx-health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}

# -------------------------------------------------------------------------- #
# HTTP Server for localhost / development testing
# -------------------------------------------------------------------------- #
server {
    listen 8080;
    server_name localhost 127.0.0.1 _;

    # ---- Proxy Headers ---- #
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto http;

    # ---- Upgrade for WebSocket ---- #
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # ---- API & WebSocket Proxy ---- #
    location ~ ^/(api|auth|ws|socket.io)/ {
        proxy_pass http://foss_backend;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ---- Static Assets ---- #
    location /static/ {
        proxy_pass http://foss_backend;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ---- Everything else → Backend ---- #
    location / {
        proxy_pass http://foss_backend;
